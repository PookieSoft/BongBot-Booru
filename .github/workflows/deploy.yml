name: Create Release and Deploy BongBot-Booru

# Thin caller for PookieSoft/workflows release. Booru is a runtime bot, not a
# published library — publish-package is false.

on:
    push:
        branches: [main]

permissions:
    contents: write
    pull-requests: read
    packages: read

jobs:
    release:
        uses: PookieSoft/workflows/.github/workflows/release.yml@v1
        with:
            runtime: node
            build-docker: true
            docker-image-name: bongbot-booru
            publish-package: false
            codecov-slug: PookieSoft/BongBot-Booru
            environment: Prod
        secrets: inherit
